name: release

# Publica el .zip del programa al pushear un tag vX.Y.Z. Lo consume el auto-update
# (update.rs busca el asset .zip del ultimo release). Para sacar una version:
#   1) subir la version en Cargo.toml
#   2) git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # crear el release

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust (MSVC) + fmt/clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2

      # GATE: no se publica nada si fmt/clippy/test no pasan (evita auto-distribuir regresiones).
      - name: Verificacion (gate)
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --features gui -- -D warnings
          cargo test --features p2p

      - name: Build release (single-exe GUI + CLI)
        run: cargo build --release --features gui --bin sts2-modsync

      - name: Empaquetar el zip (un solo .exe)
        run: |
          Compress-Archive -Path target/release/sts2-modsync.exe -DestinationPath sts2-modsync-windows-x86_64.zip -Force

      - name: Firmar el zip (si hay clave secreta en secrets; sino no firma)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: target/release/sts2-modsync.exe sign sts2-modsync-windows-x86_64.zip

      - name: Crear el GitHub Release (zip + .minisig si se firmo)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = @("sts2-modsync-windows-x86_64.zip")
          if (Test-Path "sts2-modsync-windows-x86_64.zip.minisig") { $files += "sts2-modsync-windows-x86_64.zip.minisig" }
          gh release create ${{ github.ref_name }} $files --title ${{ github.ref_name }} --generate-notes
